<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appliora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<!--font-->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Top section header-->
     <div id="top">
   <div class="top-left">
    <h1>Appliora</h1>
    <h6>Your job application tracker</h6>
    <p>Welcome back<span id="userName"></span></p>
    </div>

    <div id="searchBar">
        <input type="text" placeholder="Search a job..." id="searchInput">
        <button id="searchBtn">Search</button>
    </div>

    <!-- Wrap buttons for top-right -->
    <div class="top-buttons">
        <button id="plusAddApplicationBtn">+ Add Application</button>
        <button id="signOutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign out</button>
    </div>
     </div>
<!-- Top section header ends here-->


<!-- Form -->
     <form id="form" style="display: none;"> 
        <label for="compName">Company name *</label>
        <input type="text" id="compName">

        <label for="position">Position *</label>
        <input type="text" id="position">


        <label for="jobType">Job type</label>
        <select id="jobType">
            <option>Internship</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
        </select>

        <label for="jobStatus">Status</label>
        <select id="jobStatus">
            <option>Applied</option>
            <option>Interview</option>
            <option>Rejected</option>
            <option>Other</option>
        </select>
      
    <!--If user selects rejected from the options-->
    <div id="rejectionContainer" style="display:none;">
    <label for="rejectionReason">Rejection Reason:</label>
    <textarea id="rejectionReason" rows="3"></textarea>
    </div>

        
        <label for="date">Application Date</label>
        <input type="date" id="date">

        <label for="resume">Resume used</label>
        <input type="text" id="resume" placeholder="e.g. Resume_v2.pdf">

        <label for="message">Notes</label>
        <textarea id="message" name="message" rows="4" cols="50"></textarea>

    <!--Buttons-->
       <button id="addApplicationBtn">Add Application</button>
       <button id="cancelBtn">Cancel</button>
     </form>

<!--Form ends here-->

<!--Middle section-->
    <div class="middle">
        <div id="totalApplications">
            <h2>Total Applications</h2>
            <span id="count"></span>
        </div>

        <div id="interviews">
            <h2>Interviews</h2>
            <span id="int-count"></i></span>
        </div>

        <div id="rejected">
            <h2>Rejected</h2>
            <span id="rej-count"></span>
       </div>

       <div id="other">
           <h2>Other</h2>
           <span id="other-count"></span>
       </div>
    </div>

<!--Middle section ends here-->


<!--Bottom section-->
    <div class="bottom" id="bottomm">
        <div id="bottom-will-hide">
       <h1><i class="fa-regular fa-file"></i></h1>
       <h3>No applications yet</h3>
       <p>Start tracking your job application by clicking the "Add Application" button above</p>
       </div>
       
       <!--To show added applications-->
       <ul id="displayList"></ul>
    </div>


<!--Contact form-->
    <footer id="footer">
        <button id="contactBtn">Contact me</button>

        <!--form-->
        <form id="contactForm" style="display: none;">
            <label for="name">Name: </label>
            <input id="name" type="text">

            <label for="email">Email: </label>
            <input type="email" id="email">

            <label for="subject">Subject:</label>
            <input type="text" id="subject">

            <label for="messageMe"> Message: </label>
            <textarea id="messageMe" name="message" rows="4" cols="50"></textarea>
            <button id="submitMsg">Submit</button>
            <button id="cancelBtn">Cancel</button>   
        </form>

    </footer>

<!--Linking JS file-->
    <script src="script.js"></script>
</body>
</html>
