<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appliora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <!-- Top part header-->
    <div class="top">
            <h1>Appliora</h1>
            <h5>Your job application tracker</h5>
            <p>Welcome back<span id="userName"></span></p>
        
        <button id="plusAddApplicationBtn" class="align-right-top">+ Add Application</button>
        <button id="signOutBtn" class="align-right-top"><i class="fa-solid fa-arrow-right-from-bracket"></i>Sign out</button>   
    </div>
    <!--header ends here--> 

    <!-- Form -->
     <form id="form" style="display: none;"> ------------
        <label for="compName">Company name *</label>
        <input type="text" id="compName">

        <label for="position">Position *</label>
        <input type="text" id="position">


        <label for="jobType">Job type</label>
        <select id="jobType">
            <option>Internship</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>

        </select>

        <label for="jobStatus">Status</label>
        <select id="jobStatus">
            <option>Applied</option>
            <option>Interview</option>
            <option>Rejected</option>
            <option>Other</option>
        </select>
      
      
        <div id="rejectionContainer" style="display:none;">
    <label for="rejectionReason">Rejection Reason:</label>
    <textarea id="rejectionReason" rows="3"></textarea>
</div>

        <label for="date">Application Date</label>
        <input type="date" id="date">

        <label for="resume">Resume used</label>
        <input type="text" id="resume" placeholder="e.g. Resume_v2.pdf">

        <label for="message">Notes</label>
        <textarea id="message" name="message" rows="4" cols="50"></textarea>


       <button id="addApplicationBtn">Add Application</button>
       <button id="cancelBtn">Cancel</button>
     </form>

    <!--Middle part-->
    <div class="middle">
        <div id="totalApplications">
            <h2>Total Applications</h2>
            <span id="count"> 0</span>
        </div>
        <div id="interviews">
            <h2>Interviews</h2>
            <span id="int-count"> 0</i></span>
        </div>
        <div id="rejected">
            <h2>Rejected</h2>
            <span id="rej-count"> 0</span>
       </div>
       <div id="other">
           <h2>Other</h2>
           <span id="other-count"> 0</span>
       </div>


    <!--Bottom part-->
    <div class="bottom" id="bottomm">
        <div id="bottom-will-hide">
       <h1><i class="fa-regular fa-file"></i></h1>
       <h3>No applications yet</h3>
       <p>Start tracking your job application by clicking the "Add Application" button above</p>
       </div>
       <ul id="displayList"></ul>
    <script src="script.js"></script>
</body>
</html>
